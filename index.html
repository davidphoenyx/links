<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Phoenyx - Links</title>
    <script src="https://kit.fontawesome.com/d5c517e9ce.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 40px 20px;
        }

        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            padding: 4px;
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 2rem; }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--card-bg);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .link-card i {
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
        }

        .link-card:hover {
            background: var(--accent-color);
            color: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://avatars.githubusercontent.com/u/95734705?v=4" alt="Foto" class="profile-img">
        <h1>David Phoenyx</h1>
        <p>👾 Gamer quando tenho vontade...</p>
        <p>🐻 Vivenciando um amor verdadeiro!</p>
        <p>👨🏻‍💻 Um eterno estudante.</p>

        <div id="links-list" class="links-container">
            </div>

        <footer>© 2026 • David Phoenyx</footer>
    </div>

    <script>
        // Lista de links com classes do Font Awesome
        const meusLinks = [
            { nome: "GitHub", url: "https://github.com/davidphoenyx", icone: "fa-brands fa-github" },
            { nome: "Signal", url: "https://signal.me/#eu/C8Anu2iFj5J1dzm26hnWWwSCUXdMYbdqhSu3eZxrswAgJGdWC6xAbae8nZ5BW29K", icone: "fa-brands fa-signal-messenger" },
            { nome: "BlueSky", url: "https://bsky.app/profile/davidphoenyx.bsky.social", icone: "fa-brands fa-bluesky" },
            { nome: "UpScrolled", url: "https://share.upscrolled.com/en/user/56eac9c8-16a4-4a0c-9cf2-6946c2d5a469", icone: "fa-solid fa-camera-retro" }
        ];

        function carregarLinks() {
            const container = document.getElementById('links-list');
            
            meusLinks.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.target = "_blank";
                a.className = 'link-card';
                
                // Cria o elemento de ícone e o texto
                a.innerHTML = `<i class="${item.icone}"></i> <span>${item.nome}</span>`;
                
                container.appendChild(a);
            });
        }

        window.onload = carregarLinks;
    </script>
</body>
</html>
